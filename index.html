<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <title>Bootstrap</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<body>
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <form class="form">
          <label class="form-label" for="nome">Seu nome:</label>
          <input class="form-control" name="" type="text" value="" id="nome"/>
          <label class="form-label" for="email">Seu e-mail:</label>
          <input class="form-control" name="" type="email" value="" id="email"/>
          <label class="form-label" for="telefone">Seu telefone</label>
          <input type="tel" class="form-control" id="telefone"></input>
          <button class="btn btn-outline-success" type="submit">Enviar</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
