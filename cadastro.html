        <div class="container container-flex">
            <h1>Ebac Motors</h1>
            <div class="menu-hamburguer">
                <span></span>

        <nav>

                </ul>
            </div>
        </nav>
    </header>
    <section>
        <div class="container">
            <h2>Sign-up</h2>
            <form action="">
                <div class="form"><label for="nome">Nome:</label><input type="text" name="nome" id="nome"></div>
                <div class="form"><label for="email">E-mail:</label><input type="email" name="email" id="email"></div>
                <div class="form"><label for="telefone">Telefone:</label><input type="tel" name="telefone" id="telefone"></div>
                <div class="form"><label for="cpf">CPF:</label><input type="number" name="cpf" id="cpf"></div>
                <div class="form"><label for="endereco">Endereço:</label><input type="text" name="endereco" id="endereco"></div>
                <div class="form"><label for="cep">Cep:</label><input type="number" name="cep" id="cep"></div>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </section>
    <footer>
        <div class="container container-flex">
            <p>2023 &copy; Ebac Motors - Todos os direitos reservados</p>
