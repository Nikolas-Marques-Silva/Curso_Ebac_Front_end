<!doctype html>
<html class="no-js" lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Bootstrap - Carousel</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <!-- Place favicon.ico in the root directory -->
        <link href="./lib/bootstrap.min.css" rel="stylesheet"/>
    </head>
    <body>
        <!--[if lt IE 8]>
            <p class="browserupgrade">
            You are using an <strong>outdated</strong> browser. Please
            <a href="http://browsehappy.com/">upgrade your browser</a> to improve
            your experience.
            </p>
        <![endif]-->
        <div class="container">
            <div class="carousel carousel-fade slide" data-bs-ride="carousel" id="mainCarousel">
            <div class="carousel-inner">
                <div class="carousel-item active" data-bs-interval="3000">
                    <img class="d-block w-100" alt="" src="https://www.google.com/imgres?imgurl=https%3A%2F%2Fwww.petz.com.br%2Fblog%2F%2Fwp-content%2Fuploads%2F2021%2F11%2Fenxoval-para-gato-Copia.jpg&tbnid=vJ0O0mEfKlj4CM&vet=12ahUKEwid6srWz_iBAxWauJUCHftjBZkQMygAegQIARBv..i&imgrefurl=https%3A%2F%2Fwww.petz.com.br%2Fblog%2Fbem-estar%2Fenxoval-para-gato%2F&docid=GfY1AYGJ6B5EYM&w=750&h=450&q=gato&client=firefox-b-d&ved=2ahUKEwid6srWz_iBAxWauJUCHftjBZkQMygAegQIARBv"/>
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img class="d-block w-100" alt="" src="https://www.google.com/imgres?imgurl=https%3A%2F%2Fwww.panelacopet.com.br%2Fwp-content%2Fuploads%2F2023%2F08%2FAdotei-um-gato-e-agora-Saiba-como-adaptar-o-pet-ao-novo-lar-1080x675.png&tbnid=sXfDAaG11dUHFM&vet=12ahUKEwid6srWz_iBAxWauJUCHftjBZkQMygCegQIARBz..i&imgrefurl=https%3A%2F%2Fwww.panelacopet.com.br%2Fblog%2Fadotei-um-gato-e-agora%2F&docid=iU3rGshe7V1GVM&w=1080&h=675&q=gato&client=firefox-b-d&ved=2ahUKEwid6srWz_iBAxWauJUCHftjBZkQMygCegQIARBz"/>
                    <div class="carousel-caption">
                        <h2>Nomeio-te o gato mais fofo!</h2>
                    </div>
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img class="d-block w-100" alt="" src="https://www.google.com/imgres?imgurl=https%3A%2F%2Fwww.petz.com.br%2Fblog%2Fwp-content%2Fuploads%2F2023%2F08%2Fcomo-saber-quantos-meses-o-gato-tem2-1280x720.jpg&tbnid=qTkSPLMY_Ub0WM&vet=12ahUKEwid6srWz_iBAxWauJUCHftjBZkQMygDegQIARB1..i&imgrefurl=https%3A%2F%2Fwww.petz.com.br%2Fblog%2Fpets%2Fgatos%2Fcomo-saber-quantos-meses-o-gato-tem%2F&docid=6g4UHeOsyE_U8M&w=1280&h=720&q=gato&client=firefox-b-d&ved=2ahUKEwid6srWz_iBAxWauJUCHftjBZkQMygDegQIARB1"/>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2"></button>
                </div>
            </div>
        </div>
        </div>
        <script src="./lib/bootstrap.min.js">

        </script>
    </body>
</html>
