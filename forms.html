<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>

<body>
    <h1>Formulários</h1>
    <form action="">
        <input type="text" name="" id="" placehoder="Seu nome">
        <br>
        <label for="email">Seu e-mail</label>
        <input type="email" name="" id="email">
        <br>
        <input type="tel" name="" id="" placeholder="Seu telefone">
        <br>
        <input type="number" name="" id="" min="0" max="10" step="2">
        <br>
        <input type="file" name="" id="">
        <br>
        <input type="color" name="" id="">
        <br>
        <input type="checkbox" name="" id="checkbox-terms" ,="">
        <label for="checkbox-terms">Aceito os termos</label>
        <br>
        <p>Qual sua cor favorita?</p>
        <input type="radio" name="cor-favorita" id="cor-vermelha" ,="">
        <label for="cor-vermelha">vermelho</label>
        <input type="radio" name="cor-favorita" id="cor-verde" ,="">
        <label for="cor-verde">verde</label>
        <input type="radio" name="cor-favorita" id="cor-azul" ,="">
        <label for="cor-azul">azul</label>
        <br>
        <label for="">Qual seu filme favorito?</label>
        <select name="" id="" multiplo="">
            <option value="">filme 1</option>
            <option value="">filme 2</option>
            <option value="">filme 3</option>
            <br>
            <textarea name="" id="" cols="30" rows="10"></textarea>
            <br>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </select>
    </form>
</body>

</html>
