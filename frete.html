<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="Description" content="Teste de http"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<title>Title</title>
</head>
<body>
    <div class="container">
        <form id="form-request" action="">
            <div class="row mt-5">
                <h4>Dados básicos</h4>
            </div>
            <div class="row">
                <div class="col-3"><input type="text" name="" id="nome" class="form-control" placeholder="Nome"></div>
                <div class="col-5"><input type="text" name="" id="" class="form-control" placeholder="Sobrenome"></div>
                <div class="col-4"><input type="email" name="" id="" placeholder="E-mail"></div>
            </div>
            <div class="row mt-3">
                <h4>Dados da entrega</h4>
            </div>
            <div class="row mb-5">
                <div class="col-3 d-flex">
                    <input type="text" name="" id="cep" class="form-control" placeholder="CEP">
                    <button type="button" id="btn-cep" class="btn btn-primary">
                        <i class="bi bi-search"></i>
                        <div
                            class="d-flex justify-content-center align-items-center"
                        >
                            <div
                                class="d-none spinner-border text-primary spinner-border-sm"
                                role="status"
                            >
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                        
                    </button>
                </div>
                <div class="col-7"><input type="text" name="" id="endereco" class="form-control" placeholder="Endereço"></div>
                <div class="col-2"><input type="number" name="" id="" class="form-control" placeholder="Número"></div>
            </div>
            <button type="submit" class="btn btn-success">Enviar</button>
        </form>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/js/bootstrap.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/0.9.0/jquery.mask.min.js"></script>
<script src="main.js"></script>
</body>
</html>
